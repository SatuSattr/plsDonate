# plsDonate language configuration

prefix: "<gray>[<green>plsDonate<gray>]<reset>"
no-permission: "<red>You don't have permission to do this!"
# {COMMAND} resolves to the command label used (donate, plsdonate, or pdn)
invalid-usage: "{PREFIX} <red>Invalid usage. <reset>try to run <yellow>/{COMMAND} help<reset> for help"

reload-success: "{PREFIX} <white>Configuration reloaded <green>successfully!"
# Shown by /pdn testdiscord. {COUNT} = number of webhooks the test was dispatched to.
discord-test-sent: "{PREFIX} <green>Test embed dispatched to <yellow>{COUNT}<green> webhook(s). If nothing appears, check the console for errors."
discord-test-no-webhooks: "{PREFIX} <red>No valid webhooks set in <yellow>discord.webhooks<red>."
discord-test-unavailable: "{PREFIX} <red>Discord notifications are not available."
cooldown-error: "{PREFIX} <white>Sorry, you're still in <yellow>{TIME}s <white>cooldown"
general-error: "{PREFIX} <red>Something wrong with the donation system! please contact admin"
min-donation-error: "{PREFIX} <white>Sorry, <red>minimum <white>amount of donation is <yellow>Rp{AMOUNT_FORMATTED}"
max-donation-error: "{PREFIX} <white>Sorry, <red>maximum <white>amount of donation is <yellow>Rp{AMOUNT_FORMATTED}"
# Shown when the amount isn't a plain number (e.g. "11000k", "abc")
invalid-amount: "{PREFIX} <white>Please <red>enter a valid amount <white>using numbers only <gray>(example: 50000)"
# Shown when the payment method isn't one of the supported options
invalid-payment-method: "{PREFIX} <red>Invalid payment method! <yellow>Options: qris, gopay, paypal"
# Available Placeholders: {METHOD}, {METHOD_UPPERCASED}, {AMOUNT_FORMATTED}
payment-method-min-error: "{PREFIX} <red>Minimum donation for {METHOD_UPPERCASED} is <yellow>Rp{AMOUNT_FORMATTED}"
invalid-email: "{PREFIX} <white>Please <red>provide <white>a valid email <gray>example: (your@gmail.com)"
message-length-error: "{PREFIX} <white>Sorry, <red>maximal length <white>of the message is <yellow>{LIMIT} Character. <white>Please shorten your message."
startup-success: "{PREFIX} plsDonate has been <green>loaded successfully! <reset>Webhook is listening on port <yellow>{PORT}"
local-env-warning:
  - "{PREFIX} <red>[!] LOCAL ENVIRONMENT DETECTED [!]"
  - "{PREFIX} <yellow>It seems you are running this server in a local environment."
  - "{PREFIX} <yellow>Please ensure that your webhook port (<white>{PORT}<yellow>) is accessible from the internet."
  - "{PREFIX} <yellow>You might need to use <white>Port Forwarding <yellow>or <white>ngrok <yellow>to make it work."
webhook-token-warning: "{PREFIX} <red>[!] WARNING: Your webhook token is still using the default value! Please change it in config.yml for security. <reset>"

donation-tab-completions-args2:
  - "your-valid@email.com"
donation-tab-completions-args3:
  - "[messages]"

# Available Placeholder: {PREFIX}, {PLAYER}, {PLAYER_UPPERCASED}, {PLAYER_LOWERCASED}, {AMOUNT}, {AMOUNT_FORMATTED}, {EMAIL}, {MESSAGE}, {MESSAGE_LOWERCASED}, {MESSAGE_UPPERCASED}, {METHOD}, {METHOD_LOWERCASED}, {METHOD_UPPERCASED}, {METHOD_COLORED}, {METHOD_COLORED_LOWERCASED}, {METHOD_COLORED_UPPERCASED}, {COMMAND}
donation-confirmation-java:
  - ""
  - "{PREFIX} Are you sure about your <#C8A1FF>Donation?"
  - ""
  - "  <gray>» <#EFEFEF>Amount: <green>Rp{AMOUNT_FORMATTED}"
  - "  <gray>» <#EFEFEF>Email: <gray>{EMAIL}"
  - "  <gray>» <#EFEFEF>Method: {METHOD_COLORED}"
  - "  <gray>» <#EFEFEF>Message: <reset>{MESSAGE}"
  - ""
  - '     <hover:show_text:"<gray>We will generate the payment link<newline>right after you click this prompt."><click:run_command:"{COMMAND}"><green><underlined>[Yes]<reset>     <hover:show_text:"<gray>Just ignore this prompt if<newline>you don’t want to continue."><gray>[No]'
  - ""

# Available Placeholder: {PREFIX}
donation-success-java:
  - ""
  - "{PREFIX} <green>A payment link has been sent to your email!"
  - "{PREFIX} <gray>Please check your inbox to complete the donation."
  - ""

# Supported Placeholders: {PLAYER}, {PLAYER_UPPERCASED}, {PLAYER_LOWERCASED}, {AMOUNT}, {AMOUNT_FORMATTED}, {LINK}, {MESSAGE}, {METHOD}, {METHOD_LOWERCASED}, {METHOD_UPPERCASED}, {EMAIL}, {METHOD}, {METHOD_COLORED}, {METHOD_COLORED_LOWERCASED}, {METHOD_COLORED_UPPERCASED}, {ID}
donation-notification:
  - ""
  - "  <#977AF1>█<#e1d9fa>█  <#c3b0ff>{PLAYER} <reset>just donated <green>Rp{AMOUNT_FORMATTED} <reset>via {METHOD_COLORED_UPPERCASED}!"
  - "  <#e1d9fa>█<#977AF1>█  <#b987ff>» <#e0e0e0>{MESSAGE}"
  - ""

donation-confirmation-bedrock:
  title: "Donation Confirmation"
  content:
    - "<white>Are you sure about your <light_purple>Donation?"
    - ""
    - "  <gray>» Amount: <green>Rp{AMOUNT_FORMATTED}"
    - "  <gray>» Email: <gray>{EMAIL}"
    - "  <gray>» Method: {METHOD_COLORED}"
    - "  <gray>» Message: <reset>{MESSAGE}"
    - ""
    - "<white>We will send the payment link to your <gold>Email <white>after you click Yes."
    - ""
  btn-yes: "Yes"
  btn-no: "No"

# Available Placeholder: {PREFIX}
donation-help:
  - "<gray><st>          <reset> <green>plsDonate <u><yellow>/donation</u> <green>Guide <gray><st>          "
  - " "
  - "    <gold>/donate <amount> <email> <method> [messages]"
  - "    <gray>Methods »"
  - "      <gray>- <#fafafa>qris"
  - "      <gray>- <#fafafa>gopay <dark_gray>(min 10k)"
  - "      <gray>- <#fafafa>paypal <dark_gray>(min 50k)"
  - "    <gray>Example » <#fafafa>/donate 10000 hello@gmail.com qris Thanks!"
  - " "
  - "    <gold>/donate history <gray>» <#fafafa>View your donation history"
  - "    <gold>/donate top <gray>» <#fafafa>View the donation leaderboard"
  - "    <gold>/donate milestone <gray>» <#fafafa>View the donation goal"
  - " "
  - "<gray><st>                                                       "

# General / System Messages
command-only-players: "{PREFIX} <red>Only players can execute this command.</red>"
fake-donation-triggered: "{PREFIX} <green>Donation successfully faked!</green>"
push-donation-triggered: "{PREFIX} <green>Donation successfully pushed!</green>"
fake-donation-processed: "{PREFIX} <green>Fake donation successfully processed!</green>"
push-donation-processed: "{PREFIX} <green>Donation successfully processed!</green>"
donation-processing: "{PREFIX} <gray>Processing your donation form... Please check your email shortly!</gray>"
donation-email-sent: "{PREFIX} <green>A payment link has been sent to your email!</green>"
api-error: "{PREFIX} <red>API Error: {ERROR}</red>"
overlay-disabled: "{PREFIX} <red>Overlay API is not configured! Please check your config.yml</red>"

# Available Placeholders: {PREFIX}, {RANK}, {NAME}, {AMOUNT}, {AMOUNT_FORMATTED}
leaderboard-header:
  <gray><st>          <reset> <green>plsDonate <yellow><u>Leaderboard</u>
  <gray><st>          <br>
leaderboard-format: <yellow>{RANK}. <white>{NAME} <gray>- <green>Rp{AMOUNT_FORMATTED}
leaderboard-empty: <gray>No donation records found.
leaderboard-footer: "<br><gray><st>                                                    "

# Available Placeholders: {PREFIX}, {TITLE}, {CURRENT}, {TARGET}, {CURRENT_FORMATTED}, {TARGET_FORMATTED}, {PERCENT}, {START_DATE}, {START_TIME}
milestone-header:
  <gray><st>          <reset> <green>plsDonate <gold><u>Milestone</u>
  <gray><st>          <br>
milestone-title: "  <white>Title: <yellow>{TITLE}"
milestone-progress: "  <white>Progress: <green>Rp{CURRENT_FORMATTED} <gray>/ <red>Rp{TARGET_FORMATTED}"
milestone-percentage: "  <white>Percentage: <aqua>{PERCENT}%"
milestone-footer: "<br><gray><st>                                              "
milestone-disabled: "{PREFIX} <red>Milestone feature is currently disabled in config.yml."

# Player donation history (/donate history [player] [page])
# Available Placeholders: {PREFIX}, {NAME}, {PAGE}, {TOTAL_PAGES}, {TOTAL_FORMATTED}, {RANK}, {DATE}, {AMOUNT_FORMATTED}, {STATUS_COLORED}
history-header:
  <gray><st>          <reset> <green>plsDonate <aqua><u>Your History</u> <gray>(Page {PAGE}/{TOTAL_PAGES})
  <gray><st>          <br>
# Shown instead of history-header when an admin views someone else's history
history-header-other:
  <gray><st>          <reset> <green>plsDonate <aqua><u>{NAME}'s History</u> <gray>(Page {PAGE}/{TOTAL_PAGES})
  <gray><st>          <br>
history-summary: "  <white>Total: <green>Rp{TOTAL_FORMATTED} <gray>| <white>Rank: <yellow>{RANK}"
history-format: "<gray>{DATE} <gray>- <green>Rp{AMOUNT_FORMATTED} <gray>- {STATUS_COLORED}"
history-empty: "{PREFIX} <gray>No donation records found."
history-footer: "<br><gray><st>                                                    "
history-next-hover: "<gray>Click to view page {NEXT_PAGE}"

# ----------------------------------------------------------------------- #
#                         DISPLAY INDICATORS                              #
# ----------------------------------------------------------------------- #
# These customize how internal values are SHOWN to players. They change the
# display only — the underlying database values and trigger conditions are
# unaffected (e.g. a trigger condition like "{method} == 'QRIS'" still uses
# the raw method, not the label below). MiniMessage colours are supported.

# Transaction status, as shown in /pdn transaction list/info and /donate history
status-completed: "<green>COMPLETED"
status-pending: "<yellow>PENDING"
status-void: "<red>VOID"

# Transaction type, as shown in /pdn transaction info
type-sandbox: "<red>SANDBOX"
type-live: "<green>LIVE"

# Payment method labels (display only; raw method is kept for trigger conditions)
method-qris: "QRIS"
method-gopay: "GoPay"
method-paypal: "PayPal"

# Fallback values shown when data is missing
value-no-message: "No message" # donation has no attached message
value-none: "None" # %plsdonate_recent_*% with no donations yet
value-empty: "N/A" # %plsdonate_top_*% slot beyond the last donor
value-unranked: "Unranked" # player has no leaderboard rank yet

# Transaction Management Messages
# Available Placeholders (General): {PREFIX}
transaction-help-header: "<gray><st>          <reset> <green>plsDonate <gold><u>Transaction Help</u> <gray><st>          "
transaction-help-list: "  <yellow>/pdn transaction list [page] <gray>- List transactions"
transaction-help-info: "  <yellow>/pdn transaction info <id> <gray>- Detailed info"
transaction-help-delete: "  <yellow>/pdn transaction delete <id> <gray>- Delete record"
transaction-help-setstatus: "  <yellow>/pdn transaction setstatus <id> <status> <gray>- Force status"
transaction-help-clear: "  <yellow>/pdn transaction clear <player|all> <gray>- Mass delete"
transaction-help-footer: "<gray><st>                                                    "

# Available Placeholders: {PAGE}, {TOTAL_PAGES}, {NEXT_PAGE}, {ID}, {NAME}, {AMOUNT_FORMATTED}, {STATUS_COLORED}
transaction-list-header: "<gray><st>          <reset> <green>plsDonate <yellow><u>Transactions (Page {PAGE}/{TOTAL_PAGES})</u> <gray><st>          "
transaction-list-format: '<gray>#<white><click:run_command:"/pdn transaction info {ID}"><hover:show_text:"<gray>Click for details">{ID}</hover></click> <gray>| <white>{NAME} <gray>| <green>Rp{AMOUNT_FORMATTED} <gray>| {STATUS_COLORED}'
transaction-list-empty: "<gray>No transactions found in database."
transaction-list-footer: "<gray><st>                                                    "
transaction-list-next-btn: ' <yellow><click:run_command:"/pdn transaction list {NEXT_PAGE}"><hover:show_text:"<gray>Click for next page">[Next Page »]</hover></click>'

# Available Placeholders: {ID}, {TX_ID}, {NAME}, {AMOUNT_FORMATTED}, {STATUS_COLORED}, {TYPE_COLORED}, {DATE}, {COMPLETED_AT}, {CHECKSUM}
transaction-info-header: "<gray><st>          <reset> <green>plsDonate <gold><u>Transaction Details: #{ID}</u> <gray><st>          "
transaction-info-txid: " <gray>» <white>TX-ID: <yellow>{TX_ID}"
transaction-info-donor: " <gray>» <white>Donor: <yellow>{NAME}"
transaction-info-amount: " <gray>» <white>Amount: <green>Rp{AMOUNT_FORMATTED}"
transaction-info-status: " <gray>» <white>Status: {STATUS_COLORED}"
transaction-info-type: " <gray>» <white>Type: {TYPE_COLORED}"
transaction-info-date: " <gray>» <white>Date: <gray>{DATE}"
transaction-info-completed: " <gray>» <white>Completed: <gray>{COMPLETED_AT}"
transaction-info-checksum: " <gray>» <white>Checksum: <dark_gray>{CHECKSUM}"
transaction-info-footer: "<gray><st>                                                    "

# Available Placeholders (Success/Error): {ID}, {STATUS}, {TARGET}
transaction-added: "{PREFIX} <green>Transaction added successfully!"
transaction-deleted: "{PREFIX} <green>Transaction #{ID} has been deleted."
transaction-status-updated: "{PREFIX} <green>Status of #{ID} updated to <yellow>{STATUS}."
transaction-cleared: "{PREFIX} <green>Successfully cleared transactions for: <yellow>{TARGET}."
transaction-not-found: "{PREFIX} <red>Transaction not found."
transaction-invalid-id: "{PREFIX} <red>Invalid transaction ID."
transaction-invalid-amount: "{PREFIX} <red>Invalid amount format."

transaction-delete-confirmation-java:
  - ""
  - "{PREFIX} Are you sure you want to <red>delete</red> transaction <yellow>#{ID}</yellow>?"
  - ""
  - '     <hover:show_text:"<gray>Click here to delete<newline>this transaction permanently."><click:run_command:"{COMMAND}"><green><underlined>[Yes]</underlined></green></click>    <hover:show_text:"<gray>Just ignore this prompt if<newline>you don’t want to continue."><gray>[No]'
  - ""

transaction-clear-confirmation-java:
  - ""
  - "{PREFIX} Are you sure you want to <red>clear</red> transactions for <yellow>{TARGET}</yellow>?"
  - ""
  - '     <hover:show_text:"<gray>Click here to clear all<newline>transactions permanently."><click:run_command:"{COMMAND}"><green><underlined>[Yes]</underlined></green></click>    <hover:show_text:"<gray>Just ignore this prompt if<newline>you don’t want to continue."><gray>[No]'
  - ""

transaction-clear-confirmation-bedrock:
  title: "Confirm Clear Transactions"
  content:
    - "<red>Are you sure you want to clear transactions for: <white>{TARGET}</white>?</red>"
    - ""
    - "<gray>This action cannot be undone."
  btn-yes: "Yes, Clear"
  btn-no: "Cancel"

transaction-delete-confirmation-bedrock:
  title: "Confirm Delete Transaction"
  content:
    - "<red>Are you sure you want to delete transaction <white>#{ID}</white>?</red>"
    - ""
    - "<gray>This action cannot be undone."
  btn-yes: "Yes, Delete"
  btn-no: "Cancel"

loading-overlay: "{PREFIX} <gray>Fetching data from API... Please wait."

# Bedrock Donation Form
# Shown when a Bedrock player runs /donate without arguments.
# Use MiniMessage tags for colors (e.g. <yellow>, <green>, <bold>).
donation-form:
  title: "Donation"
  amount-label: "<white>Amount"
  amount-placeholder: "e.g 1000, 5000, 25000"
  email-label: "<white>Email"
  email-placeholder: "your@email.com"
  method-label: "<white>Payment Method"
  message-label: "<white>Message (optional)"
  message-placeholder: "e.g Deez Nuts"
  # Override display labels for each payment method (keyed by method id).
  method-qris: "<red>QRIS"
  method-gopay: "<green>GoPay <gray>- Min 10k"
  method-paypal: "<aqua>PayPal <gray>- Min 50k"
# Shown when amount or email field is left empty on form submit.
donation-form-incomplete: "{PREFIX} <red>Please fill in all required fields before submitting."
