# plsDonate default configuration

# Whether or not the plugin logic should be executed
enabled: true

# The language file to use inside the 'lang' folder (without .yml).
# Available languages: en-US
language: "en-US"

# Webhook Listener Configuration
webhook:
  # Port number where the webhook listens. It can be anything from 0-65535.
  # Ensure this port is open in your firewall and/or server panel.
  port: 21172

  # The URL path for the webhook. (e.g., http://your-ip:port/plsdonate)
  path: "plsdonate"

# Tako.id API Integration
tako:
  # Your creator name on tako.id. (case sensitive)
  creator: ""

  # Your private API key from the tako.id creator dashboard.
  api-key: "your_secret_api_key_here"

  # Secret token used to verify incoming webhooks from tako.id.
  webhook-token: "your_secret_token_here"

  # Local Milestone Configuration (Replaces Overlay API)
  milestone:
    # Whether to enable the milestone/goal feature
    enabled: true
    # The title of your donation goal
    title: "Monthly Server Goal"
    # The target amount in IDR
    target: 1000000
    # Starting amount (if you want to include previous donations manually)
    start-offset: 0

# Donation Feature Configuration
donate:
  amount:
    # Minimum amount a player can donate per request.
    min: 1000
    # Maximum amount a player can donate per request.
    max: 10000000

  # Character limit for the optional donation message.
  message:
    max-length: 100

  # Cooldown in seconds before a player can start another donation request.
  cooldown: 15

  # Requires the player to click a "Yes" button before processing the donation
  confirmation: true

  # Global notification settings
  notification: true

  # Triggers System
  triggers: false

# Discord Webhook Notification
#
# Sends a fully customizable embed to Discord when a LIVE donation arrives.
# below is yours to edit (no hardcoded footer, branding, or ads).
#
# Placeholders usable in any text/url field:
#   {PLAYER}           - Donor's name
#   {AMOUNT}           - Raw amount (e.g. 50000)
#   {AMOUNT_FORMATTED} - Formatted amount (e.g. 50.000)
#   {MESSAGE}          - Donation message
#   {METHOD}           - Payment method (QRIS / GoPay / PayPal)
#   {ID}               - Transaction ID
#   {DATE}             - Date/time the donation was received
#   {PLAYER_HEAD}      - URL of the donor's avatar (for icon-url / thumbnail / image)
#
discord:
  enabled: false

  # One or more Discord webhook URLs. Every listed webhook receives the embed.
  webhooks:
    - "https://discord.com/api/webhooks/ID/TOKEN"

  embed:
    # Color of the embed's left bar, as a hex code. Leave blank to omit.
    color: "#FFD700"

    # Small line + icon at the very top of the embed.
    author:
      icon-url: "{PLAYER_HEAD}"
      name: "New Donation!"

    # Large bold heading. Leave blank to omit.
    title: ""

    # Main body text. Supports basic Discord markdown (**bold**, *italic*).
    description: "**{PLAYER}** just donated **Rp{AMOUNT_FORMATTED}**!"

    # Small image shown at the top-right of the embed. Can be {PLAYER_HEAD} or
    # any image URL. Leave blank to omit.
    thumbnail: "{PLAYER_HEAD}"

    # Large full-width image shown at the bottom of the embed (above the footer).
    # Good for a banner or donation artwork. Can be {PLAYER_HEAD} or any image URL.
    # Leave blank to omit.
    image: ""

    # Extra key/value rows. Any field whose value resolves to empty is hidden,
    # so e.g. the Message row disappears automatically when no message is given.
    fields:
      - name: "Amount"
        value: "Rp{AMOUNT_FORMATTED}"
        inline: true
      - name: "Method"
        value: "{METHOD}"
        inline: true
      - name: "Message"
        value: "{MESSAGE}"
        inline: false

    # Small line + icon at the bottom of the embed.
    footer:
      icon-url: "https://imgur.com/tnfqsHW"
      text: "plsDonate"
      timestamp: true

# Advanced SMTP Email System (Used to send clickable payment links to Bedrock players)
email:
  # Name displayed as the sender in the user's inbox
  from-name: "plsDonate"
  subject: "Your Donation Payment Link - plsDonate"

  # Custom HTML template for the email (found in templates/ folder).
  # Supported Placeholders: {PLAYER}, {PLAYER_UPPERCASED}, {PLAYER_LOWERCASED}, {AMOUNT}, {AMOUNT_FORMATTED}, {LINK}, {MESSAGE}, {METHOD}, {METHOD_LOWERCASED}, {METHOD_UPPERCASED}
  body-template: "payment.html"

  # Fallback SMTP System
  # The plugin will iterate through the list in order, using the first working host.
  # If 'from' email is omitted/blank, the plugin will fall back to the login 'user' email.
  hosts:
    - host: "smtp.gmail.com"
      port: 587
      user: "email@gmail.com"
      pass: "your_app_password"
      secure: false
      # Custom sender details for this specific host
      from:
        name: "plsDonate"
        # Optional: Put your custom routing email here!
        email: ""

    # Example Fallback Host (uncomment and configure)
    # - host: "smtp.office365.com"
    #   port: 587
    #   user: "email2@example.com"
    #   pass: "another_password"
    #   secure: false
    #   from:
    #     name: "plsDonate"
    #     email: ""

# Audio feedback for donation stages.
# Format: "sound_name,pitch,volume" (e.g., "entity.experience_orb.pickup,1.2,1.0")
sound-effects:
  # Sounds played when the player is first prompted to confirm their donation.
  donation-confirmation:
    - "minecraft:ui.hud.bubble_pop,1,1"
    - "minecraft:block.note_block.hat,0.8,1"

  # Sounds played when [Yes] is clicked and the request is being sent to the API.
  donation-processed:
    - ""

  # Sounds played when the payment link is successfully shown in chat.
  donation-success:
    - "minecraft:ui.hud.bubble_pop,1,1"
    - "minecraft:item.bundle.remove_one,1,1"

  # Sounds played to all online players when a donation is successfully received.
  donation-received:
    - "minecraft:entity.player.levelup,1,1"
    - "minecraft:entity.experience_orb.pickup,1,1"

# Bedrock Donation Form Configuration
# Controls the form shown when a Bedrock player runs /donate without arguments.
#
# Amount modes:
#   TEXT     - Player types the amount freely in a text input field.
#   DROPDOWN - Player selects from a fixed list of predefined amounts.
#   SLIDER   - Player drags a slider (configure min, max, step below).
donation-form:
  amount-mode: TEXT

  # Predefined amounts for DROPDOWN mode.
  # Must be whole numbers. Values are sorted before display.
  # Ignored when amount-mode is TEXT or SLIDER.
  amount-presets: [5000, 10000, 25000, 50000, 100000, 250000, 500000]

  # Settings for SLIDER mode.
  # Ignored when amount-mode is TEXT or DROPDOWN.
  amount-slider-min: 1000
  amount-slider-max: 10000000
  amount-slider-step: 5000
  amount-slider-default: 50000

  # Payment methods available in the form dropdown.
  #   id  - Internal method identifier (must be: qris, gopay, paypal).
  #   min - Minimum donation amount for this method. Set 0 for no method-specific minimum.
  # The display label for each method is read from the language file:
  #   donation-form.method-<id>  (falls back to the id in uppercase if missing)
  payment-methods:
    - id: qris
      min: 5000
    - id: gopay
      min: 10000
    - id: paypal
      min: 50000

# Bedrock Support (Requires GeyserMC and Floodgate on your server)
bedrock-support: false

# Global Number Formatting
format:
  # The locale used for number formatting.
  # This determines the decimal and thousand separators.
  # Common Locales by Format:
  # - id-ID 1.000.000 (Indonesian)
  # - en-US 1,000,000 (US English)
  # - fr-FR 1 000 000 (French)
  # - de-CH 1'000'000 (Swiss German)
  locale: "id-ID"
